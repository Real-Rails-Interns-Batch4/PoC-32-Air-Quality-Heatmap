services:
  - type: web
    name: airquality-backend
    runtime: python
    plan: free
    rootDir: air-quality-poc/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://airquality-frontend.onrender.com

  - type: web
    name: airquality-frontend
    runtime: node
    plan: free
    rootDir: air-quality-poc/frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://airquality-backend.onrender.com
